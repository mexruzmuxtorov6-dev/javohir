
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javohir AI | Chat Interface</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --chat-bg: #212121;
            --sidebar-bg: #171717;
            --user-msg: #ececec;
            --ai-msg: #b4b4b4;
            --input-bg: #2f2f2f;
        }

        body, html {
            height: 100%;
            margin: 0;
            background-color: var(--chat-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 10px;
            transition: all 0.3s;
        }

        .new-chat-btn {
            border: 1px solid #4d4d4d;
            border-radius: 5px;
            padding: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .new-chat-btn:hover { background-color: #2b2b2b; }

        .chat-history {
            flex: 1;
            margin-top: 20px;
            overflow-y: auto;
        }

        .history-item {
            padding: 8px 10px;
            border-radius: 5px;
            font-size: 0.85rem;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-item:hover { background-color: #2b2b2b; }

        /* Chat Main Area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .message-row {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            display: flex;
            gap: 20px;
        }

        .ai-row { background-color: transparent; }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .user-avatar { background-color: #5436da; }
        .ai-avatar { background-color: #19c37d; }

        .message-content {
            flex: 1;
            line-height: 1.6;
            font-size: 1rem;
        }

        /* Input Area */
        .input-wrapper {
            padding: 20px;
            display: flex;
            justify-content: center;
            background: linear-gradient(transparent, var(--chat-bg) 20%);
        }

        .input-box {
            width: 100%;
            max-width: 800px;
            background-color: var(--input-bg);
            border: 1px solid #4d4d4d;
            border-radius: 15px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        .input-box textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            resize: none;
            max-height: 200px;
        }

        .send-btn {
            background-color: #676767;
            color: #212121;
            border: none;
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .send-btn.active {
            background-color: white;
        }

        /* Branding */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            opacity: 0.8;
        }

        .welcome-screen i { font-size: 3rem; margin-bottom: 20px; color: #19c37d; }
    </style>
</head>
<body>

    <div class="sidebar d-none d-md-flex">
        <div class="new-chat-btn">
            <i class="bi bi-plus-lg"></i> New Chat
        </div>
        <div class="chat-history" id="history">
            <div class="history-item">Javohir AI nima qila oladi?</div>
            <div class="history-item">Python dasturlash tili...</div>
            <div class="history-item">Qanday qilib klon yasash...</div>
        </div>
        <div class="mt-auto pt-3 border-top border-secondary">
            <div class="history-item"><i class="bi bi-person-circle me-2"></i> Javohir User</div>
        </div>
    </div>

    <div class="main-chat">
        <div class="chat-container" id="chatWindow">
            <div class="welcome-screen" id="welcome">
                <i class="bi bi-robot"></i>
                <h2>Javohir AI</h2>
                <p>Bugun sizga qanday yordam bera olaman?</p>
            </div>
        </div>

        <div class="input-wrapper">
            <div class="input-box">
                <textarea id="userInput" rows="1" placeholder="Mexruz AI ga xabar yuboring..." oninput="checkInput()"></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <i class="bi bi-arrow-up-short fs-4"></i>
                </button>
            </div>
        </div>
        <div class="text-center pb-2" style="font-size: 10px; color: #888;">
            Javohir AI can make mistakes. Check important info.
        </div>
    </div>

    <script>
        const input = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatWindow = document.getElementById('chatWindow');
        const welcome = document.getElementById('welcome');

        function checkInput() {
            sendBtn.classList.toggle('active', input.value.trim() !== '');
            input.style.height = 'auto';
            input.style.height = input.scrollHeight + 'px';
        }

        function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            if(welcome) welcome.style.display = 'none';

            // User Message
            appendMessage('M', text, 'user-avatar');
            
            input.value = '';
            checkInput();

            // Fake AI Response (Mock)
            setTimeout(() => {
                appendMessage('AI', "Salom! Men Javohir AI kloniman. Sizga qanday yordam bera olaman? Men hozircha faqat interfeys sifatida ishlayman.", 'ai-avatar ai-row');
                chatWindow.scrollTop = chatWindow.scrollHeight;
            }, 600);
        }

        function appendMessage(sender, text, classes) {
            const row = document.createElement('div');
            row.className = `message-row ${classes.includes('ai-row') ? 'ai-row' : ''}`;
            
            row.innerHTML = `
                <div class="avatar ${classes.split(' ')[0]}">${sender}</div>
                <div class="message-content">${text}</div>
            `;
            
            chatWindow.appendChild(row);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // Enter orqali yuborish
        input.addEventListener("keypress", function(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
